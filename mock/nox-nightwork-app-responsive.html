    overflow-y:auto !important;

  .nox .tabbar::after{
    content:"NOX"; position:absolute; top:24px; left:58px;
    font-family:'Cormorant Garamond',serif; font-weight:700;
    font-size:22px; letter-spacing:4px; color:var(--champ); line-height:1;
  }
  /* each tab becomes a horizontal row item */
  .nox .tabbar .tab{
    flex-direction:row !important;
    justify-content:flex-start !important;
    align-items:center !important;
    gap:12px !important;
    width:100% !important;
    padding:11px 12px !important;
    border-radius:11px !important;
    font-size:13px !important;
    font-weight:700 !important;
    text-align:left !important;
  }
  .nox .tabbar .tab svg{ width:19px !important; height:19px !important; flex-shrink:0; }
  .nox .tabbar .tab.on{
    background:linear-gradient(135deg,rgba(201,162,74,.16),rgba(201,162,74,.05)) !important;
    box-shadow:inset 0 0 0 1px rgba(201,162,74,.28);
  }
  .nox .tabbar .tab:hover{ background:rgba(255,255,255,.04) !important; }

  /* Give the main content room for the sidebar and center a readable column */
  .nox .top{
    padding-left:236px !important;
  }
  .nox .main{
    padding:26px 32px 40px 244px !important;
  }
  /* Center + cap the working column so it doesn't stretch on ultrawide */
  .nox .main > *{
    max-width:1120px;
    margin-left:auto; margin-right:auto;
  }

  /* Denser use of horizontal space */
  .nox .kgrid{ grid-template-columns:repeat(4,1fr) !important; }
  .nox .tblgrid2{ grid-template-columns:repeat(3,1fr) !important; }
  .nox .tblgrid{ grid-template-columns:repeat(5,1fr) !important; }
  .nox .roles{ grid-template-columns:repeat(4,1fr) !important; }

  /* Toast should sit relative to the content area, not the phone center */
  .nox .toast{ bottom:28px !important; left:auto !important; right:32px !important;
               transform:none !important; }

  /* Login card a touch larger on big screens */
  .nox .login .lcard{ max-width:420px !important; padding:30px 28px !important; }
}

/* =========================  WIDE DESKTOP  ========================= */
@media (min-width:1180px){
  .nox .kgrid{ grid-template-columns:repeat(4,1fr) !important; }
  .nox .main{ padding-left:252px !important; padding-right:44px !important; }
}

/* =========================  TWO-PANE DASHBOARD (>=1024px)  =========================
   On desktop, let the dashboard KPI row + lists breathe in a grid where it helps.
   Kept conservative so it never breaks the phone-first component markup. */
@media (min-width:1024px){

<script>
/* Tag the app root so pointer/hover rules only apply where intended, and
   ensure the viewport meta allows scaling out on desktop while staying
   phone-perfect on mobile. No app logic is touched. */
(function(){
  try{
    var mv = document.querySelector('meta[name=viewport]');
    if(mv){ mv.setAttribute('content','width=device-width, initial-scale=1, viewport-fit=cover'); }
  }catch(e){}
})();
</script>
